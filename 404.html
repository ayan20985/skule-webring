<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found</title>
  <style>
    body { font-family: Inter, Arial, sans-serif; text-align: center; padding: 2em; }
    h1 { font-size: 2.5em; margin-bottom: 0.5em; }
    p { font-size: 1.2em; }
    #not-found-content { display: none; }
  </style>
</head>
<body>
  <p id="resolving-message">Looking up shortlink...</p>
  <main id="not-found-content">
    <h1>404 - Page Not Found</h1>
    <p>If you were looking for a page ending in <code>.html/</code> or a member shortlink, you will be redirected automatically.</p>
    <p><a href="/">Return to Home</a></p>
  </main>
  <script>
    const WEBRING_DATA_URL = "/js/webring-data.json";
    const NOT_FOUND_DELAY_MS = 3000;
    const RESERVED_PATHS = new Set([
      "index.html",
      "benefits.html",
      "404.html",
      "css",
      "js",
      "img",
      "badges",
      "favicon.ico",
      "robots.txt",
      "sitemap.xml",
      "cname"
    ]);
    const resolvingMessage = document.getElementById("resolving-message");
    const notFoundContent = document.getElementById("not-found-content");

    function showNotFound() {
      if (resolvingMessage) {
        resolvingMessage.style.display = "none";
      }
      if (notFoundContent) {
        notFoundContent.style.display = "block";
      }
    }

    function showNotFoundAfterDelay() {
      window.setTimeout(showNotFound, NOT_FOUND_DELAY_MS);
    }

    function normalizeAlias(alias) {
      if (!alias) return "";
      return alias
        .toString()
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9-]/g, "");
    }

    function createAliasMap(memberList) {
      const aliasMap = new Map();
      const baseAliasCounts = new Map();

      memberList.forEach((member) => {
        if (!member || !member.website) return;

        const baseAlias = normalizeAlias(member.specialLink || member.name);
        if (!baseAlias) return;

        const count = baseAliasCounts.get(baseAlias) || 0;
        baseAliasCounts.set(baseAlias, count + 1);

        let resolvedAlias = baseAlias;
        if (count >= 1) {
          resolvedAlias = `${baseAlias}duplicate`;
          if (count > 1) {
            resolvedAlias = `${resolvedAlias}${count}`;
          }
        }

        // Keep first entry for the base alias; later duplicates become baseAliasDUPLICATE, baseAliasDUPLICATE2, etc.
        if (!aliasMap.has(resolvedAlias)) {
          aliasMap.set(resolvedAlias, member.website);
        }
      });

      return aliasMap;
    }

    function getHostNoWww(urlObject) {
      return urlObject.hostname.toLowerCase().replace(/^www\./, "");
    }

    function isShortlinkPath(pathname) {
      const trimmed = pathname.replace(/^\/+|\/+$/g, "");
      if (!trimmed) return false;
      const firstSegment = trimmed.split("/")[0].toLowerCase();
      return !RESERVED_PATHS.has(firstSegment);
    }

    async function handle404Routing() {
      const path = window.location.pathname;

      // Redirect /something.html/ to /something.html
      const htmlSlashMatch = path.match(/(.*\.html)\/$/i);
      if (htmlSlashMatch) {
        const newUrl = htmlSlashMatch[1] + window.location.search + window.location.hash;
        window.location.replace(newUrl);
        return;
      }

      const trimmedPath = decodeURIComponent(path).replace(/^\/+|\/+$/g, "");
      if (!trimmedPath) {
        showNotFound();
        return;
      }

      const firstSegment = trimmedPath.split("/")[0];
      const normalizedSegment = normalizeAlias(firstSegment);

      if (!normalizedSegment || RESERVED_PATHS.has(firstSegment.toLowerCase())) {
        showNotFound();
        return;
      }

      try {
        const response = await fetch(WEBRING_DATA_URL);
        if (!response.ok) {
          showNotFoundAfterDelay();
          return;
        }

        const data = await response.json();
        const memberList = Array.isArray(data.members) ? data.members : [];
        const aliasMap = createAliasMap(memberList);
        const targetUrl = aliasMap.get(normalizedSegment);

        if (targetUrl) {
          const currentUrl = new URL(window.location.href);
          const resolvedTarget = new URL(targetUrl, currentUrl.origin);
          const targetHostNoWww = getHostNoWww(resolvedTarget);
          const currentHostNoWww = getHostNoWww(currentUrl);

          // Prevent infinite loops when a member website points back to a shortlink on this same domain.
          if (targetHostNoWww === currentHostNoWww && isShortlinkPath(resolvedTarget.pathname)) {
            console.warn("Resolved shortlink points back to webring shortlink path; showing 404.");
            showNotFoundAfterDelay();
            return;
          }

          window.location.replace(resolvedTarget.href);
          return;
        }

        showNotFoundAfterDelay();
      } catch (error) {
        console.error("Could not load redirect data:", error);
        showNotFoundAfterDelay();
      }
    }

    handle404Routing();
  </script>
</body>
</html>
